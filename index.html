<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3d2b1a" />
    <meta name="description" content="The 2026 Vail Shmully — July 30 to August 2. One house, two rounds, unlimited shmullies." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐷</text></svg>" />
    <title>Shmully 2026 — Vail, CO</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If the JS bundle fails to load (stale HTML referencing a replaced
      // deploy's assets), force one fresh reload instead of a dead page.
      window.addEventListener(
        'error',
        function (e) {
          var t = e.target
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK') && !sessionStorage.getItem('shmully-recovered')) {
            sessionStorage.setItem('shmully-recovered', '1')
            location.reload()
          }
        },
        true
      )
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
